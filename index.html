<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InSitu Defense Matrix - POC</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dashboard-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        #mainVideo {
            width: 100%;
            max-height: 85vh; /* Prevents the video from overflowing the screen */
            object-fit: contain; /* Stops the zooming and cropping */
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #pipContainer {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 30%;
            max-width: 400px;
            border: 3px solid #00ffcc;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            overflow: hidden;
            z-index: 10;
        }

        #xrayVideo {
            width: 100%;
            display: block;
        }

        #alarmOverlay {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid red;
            z-index: 20;
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <h1>InSitu Threat Intercept Dashboard</h1>

    <div class="dashboard-container">
        <video id="mainVideo" src="insitu_poc.mp4" controls autoplay muted playsinline></video>

        <div id="alarmOverlay">WARNING: ANOMALY DETECTED</div>

        <div id="pipContainer">
            <video id="xrayVideo" src="true_xray.mp4" muted playsinline></video>
        </div>
    </div>

    <script>
        const mainVideo = document.getElementById('mainVideo');
        const xrayVideo = document.getElementById('xrayVideo');
        const pipContainer = document.getElementById('pipContainer');
        const alarmOverlay = document.getElementById('alarmOverlay');
        
        let interceptTriggered = false;

        mainVideo.addEventListener("timeupdate", function() {
            // Trigger exactly at 1.5 seconds when the umbrella opens
            if (mainVideo.currentTime >= 1.5 && !interceptTriggered) { 
                interceptTriggered = true;
                
                // Sync the X-Ray video perfectly to the main video
                xrayVideo.currentTime = mainVideo.currentTime;
                
                // Snap open the PIP and start playing
                pipContainer.style.display = "block";
                xrayVideo.play();
                
                // Flash the alarms
                alarmOverlay.style.display = "block";
            }
        });
        
        // Sync pause behavior
        mainVideo.addEventListener("pause", function() {
            if (interceptTriggered) xrayVideo.pause();
        });

        // Sync play behavior
        mainVideo.addEventListener("play", function() {
            if (interceptTriggered) xrayVideo.play();
        });
    </script>
</body>
</html>
