<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O.T.I.S. by SkyGuard Defense</title>
    <style>
        body {
            background-color: #000000; color: #00ffcc; font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; -webkit-touch-callout: none; -webkit-user-select: none;
        }

        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999;
        }

        #startBtn {
            padding: 20px 40px; font-size: 22px; font-family: 'Courier New', Courier, monospace; 
            font-weight: bold; color: #00ffcc; background: rgba(0, 255, 204, 0.1); border: 2px solid #00ffcc; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); cursor: pointer; text-transform: uppercase;
        }

        h1 {
            color: #ff3333; letter-spacing: 2px; text-transform: uppercase; margin: 15px 0 5px 0; 
            font-size: 1.4rem; z-index: 30; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); text-align: center;
        }
        
        .tagline {
            color: #00ffcc; font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 10px; z-index: 30;
        }

        .dashboard-container {
            position: relative; width: 100%; max-width: 1400px; height: 80vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #050505; border: 1px solid #1a332d; overflow: hidden;
        }

        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 204, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.07) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 2;
        }

        .reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 50%; pointer-events: none; z-index: 3;
        }
        .reticle::before, .reticle::after { content: ''; position: absolute; background: rgba(0, 255, 204, 0.5); }
        .reticle::before { top: 50%; left: -20px; right: -20px; height: 1px; }
        .reticle::after { left: 50%; top: -20px; bottom: -20px; width: 1px; }

        #mainVideo { width: 100%; height: 100%; object-fit: contain; pointer-events: none; z-index: 1; }

        #codeStream {
            position: absolute; top: 20px; left: 180px; width: 300px; height: 300px;
            font-size: 10px; color: rgba(0, 255, 204, 0.6); overflow: hidden; pointer-events: none; z-index: 5;
            display: flex; flex-direction: column; justify-content: flex-end;
            @media (max-width: 768px) { display: none; }
        }

        .hud-left, .hud-right {
            position: absolute; top: 20px; display: flex; flex-direction: column; gap: 8px;
            font-size: 11px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 5;
        }
        .hud-left { left: 10px; }
        .hud-right { right: 10px; text-align: right; }

        .hud-item {
            background: rgba(0, 0, 0, 0.8); padding: 5px 8px; display: flex; align-items: center; gap: 6px;
        }
        
        .status-led {
            width: 6px; height: 6px; border-radius: 50%; background-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.7);
        }
        .led-red { background-color: #ff3333 !important; box-shadow: 0 0 10px rgba(255, 51, 51, 0.9) !important; }

        .hud-right .hud-item { flex-direction: row-reverse; }
        .insitu-tag { color: #aaaaaa; }

        #pipContainer {
            visibility: hidden; opacity: 0; position: absolute; bottom: 20px; right: 20px; 
            width: 45%; max-width: 400px; border: 2px solid #ff3333; background: #000; z-index: 10;
        }
        .pip-alert-active { border-color: #39FF14 !important; box-shadow: 0 0 20px rgba(57, 255, 20, 0.7); }
        #pipContainer::before {
            content: 'ISOLATION OVERRIDE'; position: absolute; top: -20px; left: 0; color: #ff3333; 
            font-size: 10px; font-weight: bold;
        }
        #xrayVideo { width: 100%; display: block; }

        #alarmOverlay {
            display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(200, 0, 0, 1); color: white; padding: 8px 20px; font-size: 16px; 
            font-weight: bold; text-align: center; border: 2px solid #ffffff; z-index: 20; width: 80%;
        }
    </style>
</head>
<body>

    <div id="bootScreen">
        <button id="startBtn" onclick="igniteSystem(this)">INITIALIZE O.T.I.S. UPLINK</button>
    </div>

    <h1>O.T.I.S. // Optical Threat Isolation System</h1>
    <div class="tagline">- YOUR EYES IN THE SKY -</div>

    <div class="dashboard-container">
        <div class="grid-overlay"></div>
        <div class="reticle" id="targetingReticle"></div>
        <div id="codeStream"></div>

        <div class="hud-left">
            <div class="hud-item" id="sysContainer"><span class="status-led" id="led-sys"></span><span id="txt-sys">SYS: STANDBY</span></div>
            <div class="hud-item"><span class="status-led"></span><span id="altReadout">ALT: 40.2 FT</span></div>
            <div class="hud-item"><span class="status-led"></span><span id="hdgReadout">HDG: 274° W</span></div>
            <div class="hud-item" id="tgtContainer"><span class="status-led" id="led-tgt"></span><span id="txt-tgt">TGT: ACQUIRING...</span></div>
        </div>

        <video id="mainVideo" playsinline webkit-playsinline muted preload="none"></video>

        <div id="alarmOverlay">STRUCTURAL ANOMALY DETECTED</div>

        <div class="hud-right">
            <div class="hud-item"><span class="status-led"></span><span>BAT: 84%</span></div>
            <div class="hud-item"><span class="status-led"></span><span>LINK: SECURE</span></div>
            <div class="hud-item" id="camContainer"><span class="status-led" id="led-cam"></span><span id="camStatus">CAM: FPV</span></div>
            <div class="hud-item insitu-tag"><span class="status-led" id="led-insitu"></span><span id="insituStatus">CORE: INSITU LABS</span></div>
        </div>

        <div id="pipContainer">
            <video id="xrayVideo" playsinline webkit-playsinline muted preload="none"></video>
        </div>
    </div>

    <script>
        var cvCode = [
            "cv::Mat frame; cap >> frame;",
            "cv::cvtColor(frame, gray, cv::COLOR_BGR2GRAY);",
            "cv::Canny(blur, edges, 40, 120);",
            "tensor_data = otis_model.forward();",
            "kalman_filter.predict();"
        ];

        function pushCodeLine(isThreat) {
            var stream = document.getElementById('codeStream');
            if (!stream) return;
            var line = document.createElement('div');
            if (isThreat) {
                line.innerText = "EXCEPTION: void *anomaly(0xFF) -- DEPLOY X-RAY";
                line.style.color = "#ff3333"; line.style.fontWeight = "bold";
            } else {
                var randomLine = cvCode[Math.floor(Math.random() * cvCode.length)];
                var hex = "0x" + Math.random().toString(16).substring(2, 8).toUpperCase();
                line.innerText = "[" + hex + "] " + randomLine;
            }
            stream.appendChild(line);
            if (stream.childNodes.length > 20) stream.removeChild(stream.firstChild);
        }

        // The master sequence - triggered ONLY on physical tap
        function igniteSystem(btn) {
            try {
                var bootScreen = document.getElementById('bootScreen');
                var mainVideo = document.getElementById('mainVideo');
                var xrayVideo = document.getElementById('xrayVideo');

                btn.innerText = "UPLINKING...";

                // Inject the video files dynamically at the moment of the click
                mainVideo.src = "insitu_poc.mp4";
                xrayVideo.src = "true_xray.mp4";

                // Force play
                var playPromise = mainVideo.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(function() {
                        // Success! Hide boot screen and start HUD
                        bootScreen.style.display = 'none';
                        document.getElementById('txt-sys').innerText = "O.T.I.S.: ONLINE";
                        setInterval(function() { pushCodeLine(false); }, 150);
                    }).catch(function(error) {
                        // iOS blocked it. Print error directly to button.
                        btn.innerText = "IOS BLOCKED: " + error.message;
                        btn.style.borderColor = "red"; btn.style.color = "red";
                    });
                }

                // Time Engine attached AFTER successful boot
                var interceptTriggered = false;
                var step1 = false, step2 = false, step3 = false; 

                mainVideo.addEventListener("timeupdate", function() {
                    var pip = document.getElementById('pipContainer');
                    
                    if (mainVideo.currentTime >= mainVideo.duration - 0.5) {
                        mainVideo.currentTime = 0;
                        interceptTriggered = false; step1 = false; step2 = false; step3 = false;
                        
                        pip.style.visibility = "hidden"; pip.style.opacity = "0"; pip.classList.remove('pip-alert-active');
                        document.getElementById('alarmOverlay').style.display = "none";
                        xrayVideo.pause(); xrayVideo.currentTime = 0;
                        
                        document.getElementById('txt-tgt').innerText = "TGT: ACQUIRING...";
                        document.getElementById('tgtContainer').style.color = "#00ffcc";
                        document.getElementById('txt-sys').innerText = "O.T.I.S.: ONLINE";
                        document.getElementById('sysContainer').style.color = "#00ffcc";
                        document.getElementById('camStatus').style.color = "#00ffcc";
                        document.getElementById('insituStatus').style.color = "#aaaaaa"; 

                        var leds = document.querySelectorAll('.status-led');
                        for(var i=0; i<leds.length; i++) leds[i].classList.remove('led-red');
                        document.getElementById('targetingReticle').style.borderColor = "rgba(0, 255, 204, 0.3)";
                    }

                    if (mainVideo.currentTime >= 2.0 && !step1 && !interceptTriggered) {
                        step1 = true;
                        document.getElementById('led-sys').classList.add('led-red');
                        document.getElementById('txt-sys').innerText = "SYS: OVERLOAD";
                        document.getElementById('sysContainer').style.color = "#ff3333";
                    }

                    if (mainVideo.currentTime >= 2.5 && !step2 && !interceptTriggered) {
                        step2 = true;
                        document.getElementById('led-tgt').classList.add('led-red');
                        document.getElementById('txt-tgt').innerText = "TGT: DEVIATING";
                        document.getElementById('tgtContainer').style.color = "#ff3333";
                    }

                    if (
