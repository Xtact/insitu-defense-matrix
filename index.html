            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ff3333;
            letter-spacing: 2px;

        .dashboard-container {

            width: 100%;

            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;

            pointer-events: none; /* Prevents user from clicking/pausing it */

        /* Restored Technical Text - Left */
        .hud-left {
            position: absolute;
            top: 20px;
            left: 20px;

            flex-direction: column;

            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 5;
        }

            font-size: 14px;
            text-align: right;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border-left: 3px solid #00ffcc;
        }

            border-left: none;
            border-right: 3px solid #00ffcc;
        }

            background: #000;
            z-index: 10;
        }
