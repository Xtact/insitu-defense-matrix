<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InSitu Defense Matrix - POC</title>
    <style>
        body {
            background-color: #000000;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 15px 0;
            font-size: 1.5rem;
            z-index: 30;
        }

        .dashboard-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            border: 1px solid #333;
            overflow: hidden;
        }

        /* START BUTTON OVERLAY */
        #startOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #00ffcc;
            background: transparent;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #startBtn:hover {
            background: #00ffcc;
            color: #000;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* HUD Left */
        .hud-left {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 5;
        }

        /* HUD Right */
        .hud-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 14px;
            text-align: right;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-left: 3px solid #00ffcc;
        }

        .hud-right .hud-item {
            border-left: none;
            border-right: 3px solid #00ffcc;
        }

        /* X-RAY PIP */
        #pipContainer {
            display: none;
            position: absolute;
            bottom: 60px;
            right: 40px;
            width: 45%;
            max-width: 600px;
            border: 3px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
            background: #000;
            z-index: 10;
        }

        #xrayVideo {
            width: 100%;
            display: block;
        }

        #alarmOverlay {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 10px 30px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            z-index: 20;
            animation: flash 0.8s infinite alternate;
        }

        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <h1>InSitu Threat Intercept Dashboard</h1>

    <div class="dashboard-container">
        <div id="startOverlay">
            <button id="startBtn">INITIALIZE SYSTEM</button>
        </div>

        <div class="hud-left">
            <div class="hud-item" id="sysStatus">SYS: ONLINE</div>
            <div class="hud-item">ALT: 40.2 FT</div>
            <div class="hud-item">HDG: 274° W</div>
            <div class="hud-item">SPD: 0.0 MPH</div>
            <div class="hud-item" id="tgtStatus">TGT: ACQUIRING...</div>
        </div>

        <video id="mainVideo" src="insitu_poc.mp4?v=2" muted playsinline></video>

        <div id="alarmOverlay">STRUCTURAL LOSS / ANOMALY DETECTED</div>

        <div class="hud-right">
            <div class="hud-item">BAT: 84%</div>
            <div class="hud-item">LINK: STABLE</div>
            <div class="hud-item">CAM: FPV 4K</div>
            <div class="hud-item">REC: 00:00:00</div>
            <div class="hud-item">AI: ACTIVE</div>
        </div>

        <div id="pipContainer">
            <video id="xrayVideo" src="true_xray.mp4?v=2" muted playsinline></video>
        </div>
    </div>

    <script>
        const mainVideo = document.getElementById('mainVideo');
        const xrayVideo = document.getElementById('xrayVideo');
        const pipContainer = document.getElementById('pipContainer');
        const alarmOverlay = document.getElementById('alarmOverlay');
        const tgtStatus = document.getElementById('tgtStatus');
        const sysStatus = document.getElementById('sysStatus');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');
        
        let interceptTriggered = false;

        // Diagnostic Error Catching
        mainVideo.onerror = function() {
            startOverlay.style.display = "none";
            alarmOverlay.innerText = "ERROR: Cannot find insitu_poc.mp4";
            alarmOverlay.style.display = "block";
            sysStatus.innerText = "SYS: VIDEO 404 ERROR";
            sysStatus.style.color = "red";
        };

        // Start button logic
        startBtn.addEventListener("click", function() {
            startOverlay.style.display = "none";
            
            // Play video and catch any browser blocking errors
            mainVideo.play().catch(function(error) {
                alarmOverlay.innerText = "PLAY ERROR: " + error.message;
                alarmOverlay.style.display = "block";
            });
        });

        mainVideo.addEventListener("timeupdate", function() {
            // LOOP RESET
            if (mainVideo.currentTime >= mainVideo.duration - 0.5) {
                mainVideo.currentTime = 0;
                interceptTriggered = false;
                pipContainer.style.display = "none";
                alarmOverlay.style.display = "none";
                xrayVideo.pause();
                xrayVideo.currentTime = 0;
                
                tgtStatus.innerText = "TGT: ACQUIRING...";
                tgtStatus.style.color = "#00ffcc";
                tgtStatus.style.borderLeft = "3px solid #00ffcc";
            }

            // TRIGGER @ 1.5s
            if (mainVideo.currentTime >= 1.5 && !interceptTriggered) { 
                interceptTriggered = true;
                
                xrayVideo.currentTime = mainVideo.currentTime;
                
                pipContainer.style.display = "block";
                xrayVideo.play().catch(e => console.log("Xray play error"));
                
                alarmOverlay.style.display = "block";
                alarmOverlay.innerText = "STRUCTURAL LOSS / ANOMALY DETECTED";
                tgtStatus.innerText = "TGT: LOST / X-RAY ACTIVE";
                tgtStatus.style.color = "#ff3333";
                tgtStatus.style.borderLeft = "3px solid #ff3333";
            }
        });
    </script>
</body>
</html>
