<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.T.I.S. by SkyGuard Defense</title>
    <style>
        body {
            background-color: #000000;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 15px 0 5px 0;
            font-size: 1.6rem;
            z-index: 30;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        
        .tagline {
            color: #00ffcc;
            font-size: 0.85rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.4);
            z-index: 30;
        }

        .dashboard-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 82vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            border: 1px solid #1a332d;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0, 255, 204, 0.05);
        }

        /* Tactical Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 2;
        }

        /* Center Targeting Reticle */
        .reticle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }
        .reticle::before, .reticle::after {
            content: ''; position: absolute; background: rgba(0, 255, 204, 0.5);
        }
        .reticle::before { top: 50%; left: -20px; right: -20px; height: 1px; }
        .reticle::after { left: 50%; top: -20px; bottom: -20px; width: 1px; }

        /* Start Button */
        #startOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 50;
        }

        #startBtn {
            padding: 15px 30px; font-size: 20px;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            color: #00ffcc; background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            cursor: pointer; text-transform: uppercase; transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        #startBtn:hover { background: #00ffcc; color: #000; }

        #mainVideo {
            width: 100%; height: 100%;
            object-fit: contain; pointer-events: none; z-index: 1;
        }

        /* LIVE C++ CODE STREAM */
        #codeStream {
            position: absolute;
            top: 20px; left: 220px; 
            width: 350px; height: 400px;
            font-size: 11px; color: rgba(0, 255, 204, 0.6);
            overflow: hidden; pointer-events: none; z-index: 5;
            text-shadow: 1px 1px 2px black;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .hud-left, .hud-right {
            position: absolute; top: 20px; display: flex; flex-direction: column; gap: 12px;
            font-size: 13px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 5;
        }
        .hud-left { left: 20px; }
        .hud-right { right: 20px; text-align: right; }

        .hud-item {
            background: rgba(0, 0, 0, 0.7); padding: 6px 12px;
            border-left: 3px solid #00ffcc; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .hud-right .hud-item { border-left: none; border-right: 3px solid #00ffcc; }

        /* Custom InSitu Labs Promo */
        .insitu-tag {
            border-right: 3px solid #555 !important;
            color: #aaaaaa;
            font-size: 11px;
            margin-top: 10px;
        }

        /* Upgraded PIP */
        #pipContainer {
            display: none; position: absolute;
            bottom: 60px; right: 40px; width: 45%; max-width: 600px;
            border: 3px solid #ff3333; 
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.4);
            background: #000; z-index: 10;
        }
        #pipContainer::before {
            content: 'O.T.I.S. ISOLATION OVERRIDE';
            position: absolute; top: -25px; left: 0; color: #ff3333; font-size: 12px; font-weight: bold;
            letter-spacing: 1px;
        }
        #xrayVideo { width: 100%; display: block; }

        #alarmOverlay {
            display: none; position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background-color: rgba(255, 0, 0, 0.85); color: white;
            padding: 10px 40px; font-size: 24px; font-weight: bold; letter-spacing: 3px;
            border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.9);
            z-index: 20; animation: flash 0.6s infinite alternate;
        }

        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0.1; } }
    </style>
</head>
