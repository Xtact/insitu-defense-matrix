<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InSitu Labs - Tactical Intercept</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            background-color: #020202;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow: hidden;
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            height: 100vh;
            width: 100vw;
        }
        
        /* Side Panels */
        .panel { 
            background: rgba(10, 15, 10, 0.9); 
            border-left: 1px solid #113311; 
            border-right: 1px solid #113311;
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
        }
        h3 { margin-top: 0; color: #fff; text-transform: uppercase; border-bottom: 1px solid #335533; padding-bottom: 5px; font-size: 1rem; letter-spacing: 2px;}
        .status-line { margin: 12px 0; font-size: 0.85em; color: #88cc88; }
        
        /* Threat Alert Classes */
        .alert-hidden { display: none; }
        .alert-active { color: #ff3333; font-weight: bold; animation: blink 0.8s infinite; text-shadow: 0 0 10px #f00; }
        .alert-resolved { color: #00ffff; font-weight: bold; text-shadow: 0 0 10px #0ff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Center Stage (Main Video) */
        .center-stage {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* Top HUD Warning Overlay */
        #hud-warning {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            padding: 10px 20px;
            font-size: 1.5rem;
            letter-spacing: 3px;
            z-index: 20;
            transition: all 0.3s;
        }

        /* The InSitu PIP Overlay */
        #pip-container {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 320px;
            height: 240px;
            border: 2px solid #0ff;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            display: none; /* Hidden until sequence triggers */
            z-index: 20;
        }
        
        /* Real X-Ray Feed - No CSS Filters */
        .pip-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .pip-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: #0ff;
            color: #000;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 2px 5px;
            box-sizing: border-box;
            z-index: 25;
        }
        .pip-crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-size: 2rem;
            font-weight: 100;
            z-index: 25;
            pointer-events: none;
        }

        /* Scrolling Code */
        .code-scroll { font-size: 0.75em; line-height: 1.4; color: #0aa; overflow-y: hidden; flex-grow: 1; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <h3>System Telemetry</h3>
        <div class="status-line">> OEM Flight Controller: DJI</div>
        <div class="status-line">> ActiveTrack Status: <span id="track-status" style="color:#0f0">LOCKED</span></div>
        <div class="status-line">> RGB Confidence: <span id="confidence-score">98.2%</span></div>
        <br><br>
        <h3>InSitu SDK Agent</h3>
        <div class="status-line">> Status: <span id="agent-status">STANDBY / MONITORING</span></div>
        <div id="countermeasure-logs" class="alert-hidden">
            <div class="status-line" style="color:#0ff">> OVERRIDE GRANTED</div>
            <div class="status-line" style="color:#0ff">> ENGAGING PHASE PROXY</div>
            <div class="status-line" style="color:#0ff">> APPLYING STRUCTURAL X-RAY</div>
        </div>
    </div>

    <div class="center-stage">
        <div id="hud-warning" style="color:#0f0; border-color:#0f0;">ACTIVETRACK: NOMINAL</div>
        
        <video id="mainVid" class="main-video" src="insitu_poc.mp4" autoplay loop muted playsinline></video>
        
        <div id="pip-container">
            <div class="pip-header">INSITU FORENSIC X-RAY [LIVE]</div>
            <video id="pipVid" class="pip-video" src="true_xray.mp4?v=2" autoplay loop muted playsinline></video>
            <div class="pip-crosshair">⌖</div>
        </div>
    </div>

    <div class="panel">
        <h3>C++ Edge Compute Log</h3>
        <div class="code-scroll" id="console"></div>
    </div>

    <script>
        // Synchronize both videos perfectly
        const mainVid = document.getElementById('mainVid');
        const pipVid = document.getElementById('pipVid');
        
        mainVid.onplay = () => {
            pipVid.play().catch(e => console.log("Waiting for interaction to play PIP"));
        };
        mainVid.onpause = () => pipVid.pause();
        mainVid.onseeked = () => pipVid.currentTime = mainVid.currentTime;

        // Sequence Timer logic
        const hud = document.getElementById('hud-warning');
        const trackStatus = document.getElementById('track-status');
        const confidence = document.getElementById('confidence-score');
        const pipContainer = document.getElementById('pip-container');
        const agentStatus = document.getElementById('agent-status');
        const countermeasureLogs = document.getElementById('countermeasure-logs');

        // This script simulates the hack sequence based on the video runtime
        setInterval(() => {
            let time = mainVid.currentTime;
            
            // Phase 1: Normal (0-6 seconds)
            if (time < 6) {
                hud.innerHTML = "ACTIVETRACK: NOMINAL";
                hud.style.color = "#0f0"; hud.style.borderColor = "#0f0";
                trackStatus.innerHTML = "LOCKED"; trackStatus.style.color = "#0f0";
                confidence.innerHTML = (95 + Math.random() * 4).toFixed(1) + "%";
                pipContainer.style.display = "none";
                agentStatus.innerHTML = "STANDBY / MONITORING"; agentStatus.style.color = "#88cc88";
                countermeasureLogs.className = "alert-hidden";
            }
            // Phase 2: The Attack / Umbrella Opens (6-9.5 seconds)
            else if (time >= 6 && time < 9.5) {
                hud.innerHTML = "WARNING: STRUCTURAL LOSS";
                hud.className = "alert-active";
                hud.style.borderColor = "#f00";
                trackStatus.innerHTML = "COMPROMISED (FLYTRAP)"; trackStatus.className = "alert-active";
                confidence.innerHTML = (12 + Math.random() * 10).toFixed(1) + "%";
                confidence.style.color = "#f00";
            }
            // Phase 3: The InSitu Intercept (9.5 seconds onwards)
            else if (time >= 9.5) {
                hud.innerHTML = "INSITU INTERCEPT: ACTIVE";
                hud.className = "alert-resolved";
                hud.style.borderColor = "#0ff";
                trackStatus.innerHTML = "OVERRIDDEN"; trackStatus.style.color = "#0ff";
                confidence.innerHTML = "N/A (GEOMETRY LOCK)"; confidence.style.color = "#0ff";
                agentStatus.innerHTML = "ACTIVE / THREAT ISOLATED"; agentStatus.style.color = "#0ff";
                countermeasureLogs.className = ""; // Reveal logs
                pipContainer.style.display = "block"; // Snap the PIP open
            }
        }, 100);

        // Scrolling C++ Console Logic
        const codeLines = [
            "// ROS NODE: /vision/insitu_immune_sys",
            "void feedCallback(const ImageConstPtr& frame) {",
            "  if (oem_confidence < 0.20) {",
            "    ROS_WARN(\"RGB COMPROMISED.\");",
            "    InSitu::StructuralGradient xray;",
            "    cv::Mat threat = cv_bridge::toCvShare(frame);",
            "    cv::GaussianBlur(threat, threat, Size(5,5), 0);",
            "    xray = InSitu::ComputePhaseEdge(threat);",
            "    if (xray.detectSyntheticAnomaly()) {",
            "      ROS_FATAL(\"FLYTRAP DETECTED.\");",
            "      flight_controller::hijack_tracking();",
            "      flight_controller::lock_geometry();",
            "    }",
            "  }",
            "}",
            "> LATENCY: 0.8ms",
            "--------------------------------"
        ];
        
        const consoleDiv = document.getElementById('console');
        let lineIndex = 0;
        setInterval(() => {
            consoleDiv.innerHTML += codeLines[lineIndex] + '<br>';
            lineIndex++;
            if(lineIndex >= codeLines.length) lineIndex = 0;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }, 600);
    </script>
</body>
</html>
